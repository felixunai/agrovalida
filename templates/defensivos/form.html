{% extends "base.html" %}
{% load widget_tweaks %}

{% block content %}
<h2 class="mb-4">
    <a href="{% url 'defensivos:list' %}" class="text-decoration-none text-dark">Produtos</a>
    {% if titulo %} / {{ titulo }}{% endif %}
</h2>

<div class="card">
    <div class="card-body">
        <form method="post" novalidate>
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                <div class="text-danger small">{{ error }}</div>
                {% endfor %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Salvar</button>
            <a href="{% url 'defensivos:list' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
